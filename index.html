<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoL</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="logo">LoL</div>

  <nav class="nav" id="nav">
    <a href="index.html">Главная</a>
    <a href="profiles.html">Анкеты</a>
    <a href="messages.html">Сообщения</a>
  </nav>

  <button class="burger" id="burger">☰</button>
</header>

<section class="hero">
  <h1>Найди свою любовь</h1>
  <p>Современный сайт знакомств</p>
  <button id="openModal">Начать</button>
</section>

<section class="slider-section">
  <h2>Популярные анкеты</h2>

  <div class="slider">
    <button id="prev">←</button>

    <div class="slides">
      <div class="card active">
        <img src="загруженное (22).jpg">
        <h3>Анна, 21</h3>
      </div>

      <div class="card">
        <img src="загруженное (23).jpg">
        <h3>Максим, 23</h3>
      </div>

      <div class="card">
        <img src="ʚ❤︎ɞ.jpg">
        <h3>София, 20</h3>
      </div>
    </div>

    <button id="next">→</button>
  </div>
</section>

<section class="tabs-section">
  <h2>Почему мы?</h2>

  <div class="tabs">
    <button class="tab-btn active" data-tab="1">Безопасность</button>
    <button class="tab-btn" data-tab="2">Общение</button>
    <button class="tab-btn" data-tab="3">Поиск</button>
  </div>

  <div class="tab-content active" id="tab-1">
    Проверенные пользователи
  </div>

  <div class="tab-content" id="tab-2">
    Удобный чат
  </div>

  <div class="tab-content" id="tab-3">
    Быстрый поиск людей
  </div>
</section>

<section class="faq">
  <h2>FAQ</h2>

  <div class="accordion-item">
    <button class="accordion-header">Как зарегистрироваться?</button>
    <div class="accordion-content">
      Нужно заполнить форму
    </div>
  </div>

  <div class="accordion-item">
    <button class="accordion-header">Сайт бесплатный?</button>
    <div class="accordion-content">
      Да
    </div>
  </div>
</section>

<footer class="footer">
  <p>© 2026 DateSpace</p>
</footer>

<div class="modal" id="modal">
  <div class="modal-content">
    <span id="closeModal">×</span>

    <form id="registerForm">
      <input type="text" id="name" placeholder="Имя">
      <input type="email" id="email" placeholder="Email">
      <button type="submit">Регистрация</button>
    </form>

    <p id="formMessage"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
